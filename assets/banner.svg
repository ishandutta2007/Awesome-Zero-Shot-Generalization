<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.1; }
        50% { transform: scale(1.1); opacity: 0.2; }
        100% { transform: scale(1); opacity: 0.1; }
      }
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
      }
      .anim-pulse {
        animation: pulse 5s ease-in-out infinite;
        transform-origin: 400px 100px;
      }
      .anim-float {
        animation: float 4s ease-in-out infinite;
      }
      .anim-rotate-right {
        animation: rotate 25s linear infinite;
      }
      .anim-rotate-left {
        animation: rotate 30s linear infinite reverse;
      }
      .title {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        font-size: 36px;
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 500;
        fill: #94a3b8;
        font-size: 15px;
        letter-spacing: 1px;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f19" rx="16" />
  
  <!-- Glowing central background -->
  <circle cx="400" cy="100" r="160" fill="url(#grad)" class="anim-pulse" />
  
  <!-- Left Decorative Circles -->
  <g class="anim-rotate-right" style="transform-origin: 100px 100px;">
    <circle cx="100" cy="100" r="60" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.3" />
    <circle cx="100" cy="100" r="40" fill="none" stroke="url(#grad)" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
  </g>
  
  <!-- Right Decorative Circles -->
  <g class="anim-rotate-left" style="transform-origin: 700px 100px;">
    <circle cx="700" cy="100" r="70" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-dasharray="12 6" opacity="0.3" />
    <circle cx="700" cy="100" r="45" fill="none" stroke="url(#grad)" stroke-width="1" stroke-dasharray="5 5" opacity="0.4" />
  </g>
  
  <!-- Content -->
  <g class="anim-float" style="text-anchor: middle;">
    <!-- Abstract network/generalization lines in background -->
    <path d="M 320,100 L 480,100 M 400,60 L 400,140" stroke="url(#grad)" stroke-width="1" opacity="0.2" />
    <circle cx="320" cy="100" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="480" cy="100" r="4" fill="#ec4899" opacity="0.6"/>
    <circle cx="400" cy="60" r="4" fill="#a855f7" opacity="0.6"/>
    <circle cx="400" cy="140" r="4" fill="#a855f7" opacity="0.6"/>

    <text x="400" y="95" class="title">Awesome Zero-Shot Generalization</text>
    <text x="400" y="132" class="subtitle">🎯 Mapping Architectures, Prompts &amp; Benchmarks</text>
  </g>
</svg>
